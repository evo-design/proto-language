name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  integration-tests:
    # Only run on non-draft PRs to avoid running tests on every push
    if: github.event.pull_request.draft == false
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install a cache
      run: |
        sudo apt-get update
        sudo apt-get install -y cache-server

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-activate-base: false
        activate-environment: proto-language
        python-version: 3.12
        channels: conda-forge,bioconda
        mamba-version: "*"

    - name: Install dependencies
      shell: bash -l {0}  # ensures conda env is activated
      run: |
        bash install.sh --install cpu
        conda activate proto-language

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        pip install --upgrade pip
        bash install.sh --install cpu
        conda activate proto-language

    - name: Run full integration tests
      shell: bash -l {0}
      run: |
        python tests/run_integration_tests.py --verbose
